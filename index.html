<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMC / ICT Trading Journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        .tab-btn.active { background-color: #334155; color: white; box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06); }
        .tab-btn.active-blue { background-color: #2563eb; color: white; box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06); }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 font-sans p-4 md:p-8 min-h-screen">

    <div class="max-w-6xl mx-auto space-y-8">
        <div class="flex flex-col md:flex-row justify-between items-center gap-6 bg-slate-800 p-4 rounded-2xl border border-slate-700 shadow-xl">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg text-white"><i data-lucide="trending-up"></i></div>
                <div>
                    <h1 class="text-xl font-bold text-white">SMC / ICT Journal</h1>
                    <p class="text-xs text-slate-400">Track, Analyze, Execute</p>
                </div>
            </div>
            
            <div class="flex flex-wrap items-center gap-2">
                <div class="flex bg-slate-900 rounded-lg p-1 mr-2" id="tab-container">
                    <button onclick="switchTab('dashboard')" id="btn-dashboard" class="tab-btn active flex items-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition-all text-slate-400 hover:text-white"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard</button>
                    <button onclick="switchTab('new')" id="btn-new" class="tab-btn flex items-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition-all text-slate-400 hover:text-white"><i data-lucide="plus-circle" class="w-4 h-4"></i> New Trade</button>
                    <button onclick="switchTab('history')" id="btn-history" class="tab-btn flex items-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition-all text-slate-400 hover:text-white"><i data-lucide="history" class="w-4 h-4"></i> History</button>
                </div>
                <button onclick="exportToCSV()" class="flex items-center gap-2 px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg text-sm font-medium transition-all shadow" title="Export to Excel/CSV"><i data-lucide="download" class="w-4 h-4"></i> Export</button>
            </div>
        </div>

        <div id="view-dashboard" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg"><div class="text-slate-400 text-sm mb-1 flex items-center gap-2"><i data-lucide="target" class="w-4 h-4"></i> Total PnL</div><div id="stat-pnl" class="text-3xl font-bold text-white">$0.00</div></div>
                <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg"><div class="text-slate-400 text-sm mb-1 flex items-center gap-2"><i data-lucide="trending-up" class="w-4 h-4"></i> Win Rate</div><div id="stat-winrate" class="text-3xl font-bold text-blue-400">0.0%</div></div>
                <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg"><div class="text-slate-400 text-sm mb-1 flex items-center gap-2"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Total Trades</div><div id="stat-total" class="text-3xl font-bold text-white">0</div></div>
                <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg"><div class="text-slate-400 text-sm mb-1 flex items-center gap-2"><i data-lucide="brain" class="w-4 h-4"></i> W / L</div><div class="text-3xl font-bold text-white"><span id="stat-wins" class="text-emerald-400">0</span> / <span id="stat-losses" class="text-red-400">0</span></div></div>
            </div>
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg h-96 relative">
                <h3 class="text-lg font-semibold text-white mb-4">PnL History</h3>
                <div class="absolute inset-0 top-16 bottom-6 left-6 right-6"><canvas id="pnlChart"></canvas></div>
            </div>
        </div>

        <form id="view-new" class="hidden bg-slate-800 p-6 md:p-8 rounded-xl border border-slate-700 shadow-lg space-y-8">
            <div>
                <h3 class="text-lg font-semibold text-white border-b border-slate-700 pb-2 mb-4 flex items-center gap-2"><i data-lucide="dollar-sign" class="w-5 h-5 text-blue-400"></i> Basic Information</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div><label class="block text-sm font-medium text-slate-400 mb-1">Date</label><input type="date" id="form-date" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white outline-none" /></div>
                    <div><label class="block text-sm font-medium text-slate-400 mb-1">Asset/Pair</label><input type="text" id="form-asset" placeholder="e.g. XAUUSD" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white outline-none" /></div>
                    <div><label class="block text-sm font-medium text-slate-400 mb-1">Position</label><select id="form-type" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white outline-none"><option value="Long">Long (Buy)</option><option value="Short">Short (Sell)</option></select></div>
                    <div><label class="block text-sm font-medium text-slate-400 mb-1">Result</label><select id="form-result" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white outline-none"><option value="Win">Win</option><option value="Lose">Lose</option><option value="BE">Break Even (BE)</option></select></div>
                    <div><label class="block text-sm font-medium text-slate-400 mb-1">PnL ($)</label><input type="number" step="0.01" id="form-pnl" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white outline-none" /></div>
                    <div><label class="block text-sm font-medium text-slate-400 mb-1">Pips</label><input type="number" step="0.1" id="form-pips" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white outline-none" /></div>
                    <div><label class="block text-sm font-medium text-slate-400 mb-1">R:R Ratio</label><input type="number" step="0.1" id="form-rr" placeholder="e.g. 2.5" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white outline-none" /></div>
                </div>
            </div>
            <div>
                <h3 class="text-lg font-semibold text-white border-b border-slate-700 pb-2 mb-4 flex items-center gap-2"><i data-lucide="trending-up" class="w-5 h-5 text-purple-400"></i> Technical Details</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div><label class="block text-sm font-medium text-slate-400 mb-1">Session</label><select id="form-session" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white outline-none"><option value="New York">New York</option><option value="London">London</option><option value="Asian">Asian</option><option value="Overlapping">Overlapping</option></select></div>
                    <div><label class="block text-sm font-medium text-slate-400 mb-1">Daily Bias</label><select id="form-bias" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white outline-none"><option value="Bullish">Bullish</option><option value="Bearish">Bearish</option><option value="Neutral">Neutral</option></select></div>
                    <div><label class="block text-sm font-medium text-slate-400 mb-1">Entry Point</label><select id="form-entry" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white outline-none"><option value="iFVG">iFVG</option><option value="CISD">CISD</option><option value="FVG">FVG</option><option value="RBS/SBR">RBS/SBR</option><option value="Order Block">Order Block</option><option value="Liquidity Sweep">Liquidity Sweep</option><option value="Other">Other</option></select></div>
                    <div><label class="block text-sm font-medium text-slate-400 mb-1">Exit Point</label><select id="form-exit" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white outline-none"><option value="ERL">ERL</option><option value="IRL">IRL</option><option value="Previous High/Low">Previous High/Low</option><option value="Trailing Stop">Trailing Stop</option><option value="Manual Close">Manual Close</option><option value="Other">Other</option></select></div>
                    <div class="md:col-span-2"><label class="block text-sm font-medium text-slate-400 mb-1">Setup Name</label><input type="text" id="form-setup" placeholder="e.g. FVG Continuation" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white outline-none" /></div>
                </div>
            </div>
            <div>
                <h3 class="text-lg font-semibold text-white border-b border-slate-700 pb-2 mb-4 flex items-center gap-2"><i data-lucide="brain" class="w-5 h-5 text-pink-400"></i> Context & Psychology</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-4">
                        <div class="flex items-center justify-between bg-slate-900 p-3 rounded-lg border border-slate-700"><span class="text-sm font-medium text-slate-300">High Impact News during trade?</span><label class="relative inline-flex items-center cursor-pointer"><input type="checkbox" id="form-news" class="sr-only peer" /><div class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-500"></div></label></div>
                        <div><label class="block text-sm font-medium text-slate-400 mb-1">Emotion during trade</label><select id="form-emotion" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white outline-none"><option value="Calm">Calm</option><option value="Confident">Confident</option><option value="Anxious">Anxious</option><option value="FOMO">FOMO</option><option value="Revenge">Revenge</option><option value="Tired">Tired</option></select></div>
                        <div><label class="block text-sm font-medium text-slate-400 mb-1">Screenshot</label><div class="flex items-center justify-center w-full"><label class="flex flex-col items-center justify-center w-full h-32 border-2 border-slate-700 border-dashed rounded-lg cursor-pointer bg-slate-900 hover:bg-slate-800"><div class="flex flex-col items-center justify-center pt-5 pb-6"><i data-lucide="camera" class="w-8 h-8 mb-2 text-slate-500"></i><p class="text-sm text-slate-400"><span class="font-semibold">Click to upload</span></p></div><input type="file" id="form-image" class="hidden" accept="image/*" /></label></div><p id="image-status" class="text-xs text-emerald-400 mt-2 hidden">Image attached successfully</p></div>
                    </div>
                    <div class="space-y-4">
                        <div><label class="block text-sm font-medium text-slate-400 mb-1">Checklist Verified</label><textarea id="form-checklist" rows="2" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white outline-none resize-none"></textarea></div>
                        <div><label class="block text-sm font-medium text-slate-400 mb-1">Trade Comments / Lessons</label><textarea id="form-comment" rows="3" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white outline-none resize-none"></textarea></div>
                    </div>
                </div>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 flex items-center justify-center gap-2"><i data-lucide="plus-circle" class="w-5 h-5"></i> Save Trade Record</button>
        </form>

        <div id="view-history" class="hidden space-y-6"><div id="history-container" class="space-y-6"></div><div id="history-empty" class="text-center text-slate-500 py-12 hidden">No trades recorded yet.</div></div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBh3YW1J4iIjBaf44teLKSDpxk20nX425w",
            authDomain: "tradingjournal-58cad.firebaseapp.com",
            projectId: "tradingjournal-58cad",
            storageBucket: "tradingjournal-58cad.firebasestorage.app",
            messagingSenderId: "1022988263064",
            appId: "1:1022988263064:web:91f9d4e1a257f633b9baed",
            measurementId: "G-EL7165KW85"
        };
        
        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (error) { console.error("Firebase init error:", error); }

        let tradesData = [], currentImageUrl = '', myChart = null;
        lucide.createIcons();
        document.getElementById('form-date').valueAsDate = new Date();

        window.switchTab = function(tabName) {
            document.getElementById('view-dashboard').classList.add('hidden');
            document.getElementById('view-new').classList.add('hidden');
            document.getElementById('view-history').classList.add('hidden');
            document.getElementById('btn-dashboard').className = "tab-btn flex items-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition-all text-slate-400 hover:text-white";
            document.getElementById('btn-new').className = "tab-btn flex items-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition-all text-slate-400 hover:text-white";
            document.getElementById('btn-history').className = "tab-btn flex items-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition-all text-slate-400 hover:text-white";
            document.getElementById(`view-${tabName}`).classList.remove('hidden');
            document.getElementById(`btn-${tabName}`).classList.add(tabName === 'new' ? 'active-blue' : 'active');
            if(tabName === 'dashboard') updateDashboard();
        };

        // --- แก้ไขตรงนี้: ไม่ต้องแยกห้องข้อมูลแล้ว ดึงจากห้อง 'trades' ส่วนกลางเลย ---
        if(auth) {
            signInAnonymously(auth); // ล็อกอินเพื่อสิทธิ์ผ่าน Security Rules เฉยๆ
            onAuthStateChanged(auth, (user) => {
                if (user) { setupFirestoreListener(); } 
            });
        }

        let unsubscribeSnapshot = null;
        function setupFirestoreListener() {
            if (!db) return;
            // ใช้ collection รวมชื่อ 'trades' แทนที่จะแยกตาม user.uid
            const tradesRef = collection(db, 'trades');
            if(unsubscribeSnapshot) unsubscribeSnapshot();
            unsubscribeSnapshot = onSnapshot(tradesRef, (snapshot) => {
                const fetchedTrades = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                fetchedTrades.sort((a, b) => new Date(b.date) - new Date(a.date) || b.timestamp - a.timestamp);
                tradesData = fetchedTrades;
                renderHistory();
                if(!document.getElementById('view-dashboard').classList.contains('hidden')) updateDashboard();
            });
        }

        function renderHistory() {
            const container = document.getElementById('history-container');
            const emptyMsg = document.getElementById('history-empty');
            container.innerHTML = '';
            if (tradesData.length === 0) { emptyMsg.classList.remove('hidden'); return; } 
            else emptyMsg.classList.add('hidden');

            tradesData.forEach(trade => {
                const isPositivePnL = Number(trade.pnl) >= 0;
                const card = document.createElement('div');
                card.className = "bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg flex flex-col md:flex-row gap-6";
                let cardHTML = `<div class="flex-1 space-y-4"><div class="flex flex-wrap items-center justify-between border-b border-slate-700 pb-3 gap-2"><div class="flex items-center gap-3"><span class="px-3 py-1 rounded-full text-xs font-bold ${trade.type === 'Long' ? 'bg-blue-500/20 text-blue-400' : 'bg-pink-500/20 text-pink-400'}">${trade.type}</span><span class="font-bold text-lg text-white">${trade.asset}</span><span class="text-slate-400 text-sm flex items-center gap-1"><i data-lucide="calendar" class="w-3 h-3"></i>${trade.date}</span></div><div class="flex items-center gap-4"><span class="font-bold text-lg ${isPositivePnL ? 'text-emerald-400' : 'text-red-400'}">${isPositivePnL ? '+' : ''}$${trade.pnl}</span><span class="px-3 py-1 rounded text-sm font-bold ${trade.result === 'Win' ? 'bg-emerald-500/20 text-emerald-400' : trade.result === 'Lose' ? 'bg-red-500/20 text-red-400' : 'bg-slate-700 text-slate-300'}">${trade.result}</span><button onclick="deleteTrade('${trade.id}')" class="text-slate-500 hover:text-red-400 transition-colors p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div></div><div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm"><div><span class="text-slate-500">Entry:</span> <span class="text-slate-200">${trade.entry}</span></div><div><span class="text-slate-500">Exit:</span> <span class="text-slate-200">${trade.exit}</span></div><div><span class="text-slate-500">Session:</span> <span class="text-slate-200">${trade.session}</span></div><div><span class="text-slate-500">Bias:</span> <span class="text-slate-200">${trade.bias}</span></div><div><span class="text-slate-500">Pips:</span> <span class="text-slate-200">${trade.pips}</span></div><div><span class="text-slate-500">R:R:</span> <span class="text-slate-200">${trade.rr || '-'}</span></div><div><span class="text-slate-500">Emotion:</span> <span class="text-slate-200">${trade.emotion}</span></div><div><span class="text-slate-500">News:</span> <span class="text-slate-200">${trade.news ? 'Yes' : 'No'}</span></div></div>`;
                if (trade.checklist || trade.comment) { cardHTML += `<div class="bg-slate-900/50 p-4 rounded-lg space-y-2 text-sm mt-4">`; if(trade.checklist) cardHTML += `<p><span class="text-slate-400 font-semibold">Checklist:</span> <span class="text-slate-300">${trade.checklist}</span></p>`; if(trade.comment) cardHTML += `<p><span class="text-slate-400 font-semibold">Comment:</span> <span class="text-slate-300">${trade.comment}</span></p>`; cardHTML += `</div>`; }
                cardHTML += `</div>`;
                if (trade.imageUrl) cardHTML += `<div class="w-full md:w-64 h-48 bg-slate-900 rounded-lg overflow-hidden border border-slate-700 flex-shrink-0"><img src="${trade.imageUrl}" alt="Trade setup" class="w-full h-full object-cover cursor-pointer" onclick="window.open('${trade.imageUrl}', '_blank')" /></div>`;
                card.innerHTML = cardHTML; container.appendChild(card);
            });
            lucide.createIcons();
        }

        window.deleteTrade = async function(tradeId) {
            if (!db) return;
            // ลบจากห้องรวม
            if(confirm("Are you sure you want to delete this trade?")) await deleteDoc(doc(db, 'trades', tradeId));
        };

        function updateDashboard() {
            const totalTrades = tradesData.length;
            const wins = tradesData.filter(t => t.result === 'Win').length;
            const losses = tradesData.filter(t => t.result === 'Lose').length;
            const winRate = totalTrades > 0 ? ((wins / totalTrades) * 100).toFixed(1) : 0;
            const totalPnl = tradesData.reduce((sum, t) => sum + Number(t.pnl || 0), 0);
            const pnlEl = document.getElementById('stat-pnl');
            pnlEl.innerText = `${totalPnl >= 0 ? '+' : ''}$${totalPnl.toFixed(2)}`;
            pnlEl.className = `text-3xl font-bold ${totalPnl >= 0 ? 'text-emerald-400' : 'text-red-400'}`;
            document.getElementById('stat-winrate').innerText = `${winRate}%`;
            document.getElementById('stat-total').innerText = totalTrades;
            document.getElementById('stat-wins').innerText = wins;
            document.getElementById('stat-losses').innerText = losses;
            updateChart();
        }

        function updateChart() {
            const ctx = document.getElementById('pnlChart').getContext('2d');
            const chartDataArray = [...tradesData].reverse();
            const labels = chartDataArray.map((t, idx) => `Trade ${idx+1} (${t.date})`);
            const pnlData = chartDataArray.map(t => Number(t.pnl || 0));
            const backgroundColors = pnlData.map(val => val >= 0 ? '#10b981' : '#ef4444');
            if (myChart) myChart.destroy();
            Chart.defaults.color = '#94a3b8'; Chart.defaults.font.family = 'ui-sans-serif, system-ui, sans-serif';
            myChart = new Chart(ctx, { type: 'bar', data: { labels: labels, datasets: [{ label: 'PnL ($)', data: pnlData, backgroundColor: backgroundColors, borderRadius: 4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1e293b', titleColor: '#f8fafc', bodyColor: '#e2e8f0', borderColor: '#334155', borderWidth: 1 } }, scales: { y: { grid: { color: '#334155', borderDash: [3, 3] }, ticks: { callback: function(value) { return '$' + value; } } }, x: { grid: { display: false }, ticks: { display: false } } } } });
        }

        document.getElementById('form-image').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const statusText = document.getElementById('image-status');
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height;
                        if (width > height) { if (width > 800) { height *= 800 / width; width = 800; } } else { if (height > 800) { width *= 800 / height; height = 800; } }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                        currentImageUrl = canvas.toDataURL('image/jpeg', 0.7);
                        statusText.classList.remove('hidden');
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('view-new').addEventListener('submit', async function(e) {
            e.preventDefault();
            if (!db) return alert("กำลังเชื่อมต่อฐานข้อมูล กรุณารอสักครู่แล้วกดใหม่ครับ");
            const newTrade = { date: document.getElementById('form-date').value, asset: document.getElementById('form-asset').value.toUpperCase(), type: document.getElementById('form-type').value, result: document.getElementById('form-result').value, pnl: Number(document.getElementById('form-pnl').value), pips: Number(document.getElementById('form-pips').value), rr: Number(document.getElementById('form-rr').value || 0), session: document.getElementById('form-session').value, bias: document.getElementById('form-bias').value, entry: document.getElementById('form-entry').value, exit: document.getElementById('form-exit').value, setup: document.getElementById('form-setup').value, news: document.getElementById('form-news').checked, emotion: document.getElementById('form-emotion').value, checklist: document.getElementById('form-checklist').value, comment: document.getElementById('form-comment').value, imageUrl: currentImageUrl, timestamp: Date.now() };
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML; submitBtn.innerHTML = "Saving..."; submitBtn.disabled = true;
            try {
                // บันทึกเข้าห้องรวม
                await addDoc(collection(db, 'trades'), newTrade);
                document.getElementById('form-asset').value = ''; document.getElementById('form-pnl').value = ''; document.getElementById('form-pips').value = ''; document.getElementById('form-rr').value = ''; document.getElementById('form-setup').value = ''; document.getElementById('form-checklist').value = ''; document.getElementById('form-comment').value = ''; document.getElementById('form-image').value = ''; document.getElementById('image-status').classList.add('hidden'); currentImageUrl = '';
                switchTab('history');
            } catch (error) { console.error(error); alert("เกิดข้อผิดพลาดในการบันทึก"); } finally { submitBtn.innerHTML = originalText; submitBtn.disabled = false; }
        });

        window.exportToCSV = function() {
            if(tradesData.length === 0) return;
            const headers = ['Date', 'Asset', 'Type', 'Result', 'PnL', 'Pips', 'RR', 'Session', 'Bias', 'Setup', 'Entry', 'Exit', 'News', 'Emotion', 'Checklist', 'Comment'];
            const csvRows = [headers.join(',')];
            tradesData.forEach(t => {
                const values = [t.date, t.asset, t.type, t.result, t.pnl, t.pips, t.rr, t.session, t.bias, `"${t.setup || ''}"`, t.entry, t.exit, t.news, t.emotion, `"${(t.checklist || '').replace(/"/g, '""')}"`, `"${(t.comment || '').replace(/"/g, '""')}"`];
                csvRows.push(values.join(','));
            });
            const blob = new Blob([csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a'); link.href = URL.createObjectURL(blob);
            link.download = `Trading_Journal_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        };
    </script>
</body>
